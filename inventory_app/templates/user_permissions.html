{% extends 'base.html' %}
{% block title %}Permissoes | Estoque Pro{% endblock %}
{% block content %}
<div class="panel">
  <h5 class="panel-title">Permissoes de {{ target_user.username }}</h5>
  <form method="post" class="row g-2">
    {% for p in permissions %}
    <div class="col-md-4">
      <label class="form-check d-flex gap-2 align-items-center">
        <input class="form-check-input" type="checkbox" name="permissions" value="{{ p.key }}" {% if p.key in selected_keys %}checked{% endif %} {% if target_user.id == current_user.id and p.key == 'manage_permissions' %}disabled{% endif %} />
        {% if target_user.id == current_user.id and p.key == 'manage_permissions' %}
        <input type="hidden" name="permissions" value="manage_permissions" />
        {% endif %}
        <span>{{ p.label }}</span>
      </label>
    </div>
    {% endfor %}
    <div class="col-12 mt-3">
      <button class="btn btn-accent">Salvar permissoes</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('main.users_management') }}">Voltar</a>
    </div>
  </form>
</div>
{% endblock %}
