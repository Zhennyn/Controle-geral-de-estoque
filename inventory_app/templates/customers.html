{% extends 'base.html' %}
{% block title %}Clientes | Estoque Pro{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-4">
    <div class="panel">
      <h5 class="panel-title">Novo cliente</h5>
      <form method="post" class="row g-2">
        <div class="col-12"><label class="form-label">Nome</label><input name="name" class="form-control" required /></div>
        <div class="col-12"><label class="form-label">Documento</label><input name="document" class="form-control" /></div>
        <div class="col-12"><label class="form-label">E-mail</label><input name="email" class="form-control" /></div>
        <div class="col-12"><label class="form-label">Telefone</label><input name="phone" class="form-control" /></div>
        <div class="col-12"><button class="btn btn-accent w-100">Cadastrar cliente</button></div>
      </form>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="panel">
      <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
        <h5 class="panel-title mb-0">Clientes cadastrados</h5>
        <form method="get" class="d-flex gap-2">
          <input name="q" value="{{ query }}" class="form-control" placeholder="Buscar cliente" />
          <button class="btn btn-outline-secondary">Buscar</button>
        </form>
      </div>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Nome</th><th>Documento</th><th>Contato</th><th></th></tr></thead>
          <tbody>
            {% for c in customers %}
            <tr>
              <td>
                <form method="post" action="{{ url_for('main.update_customer', customer_id=c.id) }}" class="d-flex gap-1">
                  <input name="name" class="form-control form-control-sm" value="{{ c.name }}" required />
              </td>
              <td><input name="document" class="form-control form-control-sm" value="{{ c.document or '' }}" /></td>
              <td>
                  <input name="phone" class="form-control form-control-sm mb-1" value="{{ c.phone or '' }}" placeholder="Telefone" />
                  <input name="email" class="form-control form-control-sm" value="{{ c.email or '' }}" placeholder="E-mail" />
              </td>
              <td class="text-end">
                  <div class="d-flex gap-1 justify-content-end">
                    <button class="btn btn-sm btn-outline-primary">Salvar</button>
                </form>
                    <form method="post" action="{{ url_for('main.delete_customer', customer_id=c.id) }}" onsubmit="return confirm('Excluir cliente?')">
                      <button class="btn btn-sm btn-outline-danger">Excluir</button>
                    </form>
                  </div>
              </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-secondary">Nenhum cliente cadastrado.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-3">
        <small class="text-secondary">Total: {{ total }}</small>
        <div class="btn-group">
          <a class="btn btn-sm btn-outline-secondary {% if not has_prev %}disabled{% endif %}" href="{{ url_for('main.customers', q=query, page=page-1) if has_prev else '#' }}">Anterior</a>
          <span class="btn btn-sm btn-light disabled">Pagina {{ page }}</span>
          <a class="btn btn-sm btn-outline-secondary {% if not has_next %}disabled{% endif %}" href="{{ url_for('main.customers', q=query, page=page+1) if has_next else '#' }}">Proxima</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
